<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Letter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

/* phone screen */

.screen{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

/* envelope */

.envelope{
width:140px;
height:90px;
position:relative;
cursor:pointer;
perspective:800px;
}

.env-body{
background:#ff6b81;
width:100%;
height:100%;
border-radius:6px;
}

.flap{
position:absolute;
top:-45px;
width:0;
height:0;
border-left:70px solid transparent;
border-right:70px solid transparent;
border-bottom:45px solid #ff4757;
transform-origin:bottom;
transition:1s;
}

.envelope.open .flap{
transform:rotateX(-180deg);
}

/* letter */

.letter{
position:absolute;
width:85%;
max-width:330px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(120px);
transition:1s;
}

.letter.show{
opacity:1;
transform:translateY(0);
}

.title{
text-align:center;
color:#ff4d6d;
margin-bottom:15px;
}

.text{
white-space:pre-line;
line-height:1.6;
font-size:15px;
}

/* polaroid */

.polaroid{
margin-top:20px;
display:flex;
justify-content:center;
}

.polaroid img{
width:120px;
background:white;
padding:8px;
box-shadow:0 8px 15px rgba(0,0,0,0.3);
animation:swing 3s infinite ease-in-out;
}

@keyframes swing{
0%{transform:rotate(-3deg)}
50%{transform:rotate(3deg)}
100%{transform:rotate(-3deg)}
}

/* petals */

.petal{
position:absolute;
top:-20px;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:.8;
}
}

/* closing */

.fadeOut{
animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
to{opacity:0}
}

</style>
</head>

<body>

<div class="screen">

<div class="envelope" id="envelope">
<div class="flap"></div>
<div class="env-body"></div>
</div>

<div class="letter" id="letter">

<h2 class="title">To You ❤️</h2>

<div class="text" id="text"></div>

<div class="polaroid">
<img src="thach.jpg" alt="">
</div>

</div>

</div>

<script>

const message=`Happy Valentine's Day ❤️

I made this little website
just to tell you something...

You are very special to me.

Every moment talking with you
makes my day brighter.

I hope we can keep
sharing beautiful moments
together for a long time.`;

const env=document.getElementById("envelope");
const letter=document.getElementById("letter");
const text=document.getElementById("text");

env.onclick=()=>{

env.classList.add("open");

setTimeout(()=>{
letter.classList.add("show");
startTyping();
startPetals();
},800)

}

/* typing */

function startTyping(){

let i=0;

function type(){

if(i<message.length){

text.innerHTML+=message.charAt(i);
i++;
setTimeout(type,40);

}else{

setTimeout(closeScene,3000);

}

}

type();

}

/* petals */

function createPetal(){

const p=document.createElement("div");

p.className="petal";
p.innerHTML=Math.random()>0.5?"❤️":"🌸";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*3+4)+"s";

document.body.appendChild(p);

setTimeout(()=>p.remove(),7000);

}

function startPetals(){
setInterval(createPetal,400);
}

/* ending */

function closeScene(){

letter.style.transform="translateY(120px)";
letter.style.opacity="0";

setTimeout(()=>{
env.classList.remove("open");
},1000)

setTimeout(()=>{
document.body.classList.add("fadeOut");
},2500)

}

</script>

</body>
</html>
